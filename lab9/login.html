<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход | Соцсеть</title>
  <link rel="stylesheet" href="css/main.css">
</head>
<body class="login">
  <nav class="menu">
    <a class="menu__link" href="login.html">Вход</a>
    <a class="menu__link" href="feed.html">Лента</a>
    <a class="menu__link" href="profile.html">Профиль</a>
  </nav>
  <div class="login__layout">
    <div class="login__media">
      <!-- Здесь потом будет картинка -->
      <img src="img/login.png" alt="Добро пожаловать" class="login__image">
    </div>
    <div class="login__form">
      <form class="form">
        <h1 class="form__title">Вход</h1>
        <div class="form__field">
          <label for="email" class="form__label">Email</label>
          <input type="email" id="email" class="form__input">
        </div>
        <div class="form__field">
          <label for="password" class="form__label">Пароль</label>
          <input type="password" id="password" class="form__input">
        </div>
        <button type="submit" class="btn btn_type_primary">Войти</button>
      </form>
    </div>
  </div>
</body>
</html>
