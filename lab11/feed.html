<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Лента | Соцсеть</title>
  <link rel="stylesheet" href="css/main.css">
</head>
<body class="feed">
  <nav class="menu">
    <a class="menu__link" href="login.html">Вход</a>
    <a class="menu__link" href="feed.html">Лента</a>
    <a class="menu__link" href="profile.html">Профиль</a>
  </nav>
  <main class="feed__list">  
    <article class="post">
      <header class="post__header">
        <img src="img/avatar.png" alt="Аватар" class="post__avatar">
        <div class="post__author">
          <span class="post__name">Иван Петров</span>
          <span class="post__time">2 часа назад</span>
        </div>
      </header>
        <div class="post__content">
        <p class="post__text" data-text>
          Мой первый пост! Мой первый пост! Мой первый пост! Мой первый пост! Мой первый пост!
          <button class="post__more" type="button" data-more hidden>ещё</button>
        </p>
        <div class="slider" data-slider>
            <button class="slider__btn slider__btn_prev" type="button" aria-label="Назад" data-prev>◀</button>
            <img class="slider__image is-active" src="img/post1.png" alt="Первая картинка">
            <img class="slider__image" src="img/post2.png" alt="Вторая картинка">
            <img class="slider__image" src="img/post3.png" alt="Третья картинка">
            <button class="slider__btn slider__btn_next" type="button" aria-label="Вперёд" data-next>▶</button>
            <div class="slider__indicator" data-indicator>1/3</div>
        </div>
        </div>
      <footer class="post__footer">
        <button class="btn btn_type_primary">❤ 15</button>
        <button class="btn">💬 3</button>
        <button class="btn">⋯</button> <!-- кнопка ещё -->
      </footer>
    </article>
  </main>
  <script src="js/app.js" defer></script>
  <div class="modal" data-modal hidden>
    <div class="modal__backdrop"></div>
    <div class="modal__content">
      <button class="modal__close" type="button" aria-label="Закрыть" data-modal-close>×</button>

      <button class="slider__btn slider__btn_prev" type="button" aria-label="Назад" data-modal-prev>◀</button>
      <img class="modal__image" data-modal-image src="" alt="Просмотр изображения">
      <button class="slider__btn slider__btn_next" type="button" aria-label="Вперёд" data-modal-next>▶</button>

      <div class="slider__indicator" data-modal-indicator>1/1</div>
    </div>
  </div>
</body>
</html>
